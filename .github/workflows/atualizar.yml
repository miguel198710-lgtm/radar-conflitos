name: Radar Automatico

on:
  schedule:
    # Corre a cada 2 horas
    - cron: '0 */2 * * *'
  workflow_dispatch: # Permite correr manualmente

jobs:
  atualizar-dados:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Aceder aos ficheiros
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar Motores (Noticias, IPMA, Video e GDELT)
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          python radar.py
          python previsao_ipma.py
          python radar_video.py
          python radar_gdelt.py  # <- A NOVA ANTENA LIGADA

      - name: Guardar Mapa e Emissao Video
        run: |
          git config --global user.name "Radar Bot"
          git config --global user.email "bot@radar.local"
          # O asterisco no geojson garante que apanha o do IPMA, o radar antigo e agora o do GDELT
          git add *.geojson *.html
          git commit -m "Atualizacao de info, video e telemetria GDELT" || echo "Sem mudanças"
          git push
