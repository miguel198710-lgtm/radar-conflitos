name: Radar Automatico

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  atualizar-dados:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Aceder aos ficheiros
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Correr Radar de Noticias
        run: python radar.py

      - name: Guardar Mapa
        run: |
          git config --global user.name "Radar Bot"
          git config --global user.email "bot@radar.local"
          git add conflitos.geojson
          git commit -m "Atualizacao de noticias" || echo "Sem mudanças"
          git push
