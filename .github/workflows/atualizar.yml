name: Radar Automatico

on:
  schedule:
    # Corre a cada 2 horas
    - cron: '0 */2 * * *'
  workflow_dispatch: # Permite correr manualmente

jobs:
  atualizar-dados:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Aceder aos ficheiros
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar Motores (Noticias e IPMA)
        run: |
          python radar.py
          python previsao_ipma.py
          
      - name: Guardar Mapa
        run: |
          git config --global user.name "Radar Bot"
          git config --global user.email "bot@radar.local"
          git add conflitos.geojson previsao_ipma.geojson 
          git commit -m "Atualizacao de info" || echo "Sem mudanças"
          git push
