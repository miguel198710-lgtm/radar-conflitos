<!DOCTYPE html>
<html>
<head>
<style>
  body {
    margin: 0;
    background-color: #050505;
    color: #ffffff;
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
    border-top: 2px solid #333;
    border-bottom: 2px solid #333;
  }
  .ticker-wrap {
    width: 100%;
    overflow: hidden;
    white-space: nowrap;
    box-sizing: border-box;
  }
  .ticker {
    display: inline-block;
    padding-left: 100%;
    animation: ticker 500s linear infinite; 
  }
  .ticker:hover {
    animation-play-state: paused;
  }
  .ticker-item {
    display: inline-block;
    padding: 10px 30px;
    font-size: 14px;
    text-transform: uppercase;
    cursor: pointer;
    display: inline-flex;
    align-items: center; /* Alinha a bandeira com o texto na perfeição */
  }
  a { text-decoration: none; } 
  .ticker-item:hover .white-text { text-decoration: underline; }
  .white-text { color: #ffffff !important; }
  .separator { color: #444; margin: 0 15px; }

  @keyframes ticker {
    0%   { transform: translate3d(0, 0, 0); }
    100% { transform: translate3d(-100%, 0, 0); }
  }
</style>
</head>
<body>

<div class="ticker-wrap"><div class="ticker" id="news-ticker">A CARREGAR INTELIGÊNCIA GLOBAL...</div></div>

<script>
  // COLA O TEU LINK RAW DO CONFLITOS.GEOJSON AQUI:
  const geojsonURL = "https://raw.githubusercontent.com/miguel198710-lgtm/radar-conflitos/refs/heads/main/conflitos.geojson";

  // DICIONÁRIO ATUALIZADO PARA CÓDIGOS ISO (Para ir buscar as imagens reais)
  const bandeiras = {
    "ukraine": "ua", "kyiv": "ua", "russia": "ru", "moscow": "ru",
    "israel": "il", "gaza": "ps", "iran": "ir", "tehran": "ir",
    "china": "cn", "beijing": "cn", "taiwan": "tw",
    "usa": "us", "us": "us", "washington": "us", "new york": "us",
    "canada": "ca", "mexico": "mx", "brazil": "br", "argentina": "ar",
    "venezuela": "ve", "colombia": "co", "cuba": "cu", "chile": "cl", "peru": "pe",
    "uk": "gb", "london": "gb", "france": "fr", "paris": "fr",
    "germany": "de", "berlin": "de", "spain": "es", "madrid": "es",
    "portugal": "pt", "lisbon": "pt", "italy": "it", "rome": "it",
    "belgium": "be", "brussels": "be", "poland": "pl", "warsaw": "pl",
    "greece": "gr", "athens": "gr", "yemen": "ye", "north korea": "kp", 
    "south korea": "kr", "lebanon": "lb", "syria": "sy"
  };

  fetch(geojsonURL)
    .then(response => response.json())
    .then(data => {
      const tickerEl = document.getElementById('news-ticker');
      tickerEl.innerHTML = ''; 
      
      data.features.forEach(feat => {
        let p = feat.properties;
        let titulo = p.titulo_evento || "EVENTO DESCONHECIDO";
        let desc = p.descricao || "";
        let cat = p.categoria ? p.categoria.toUpperCase() : "GERAL";
        let urlNoticia = p.url_fonte || "#"; 
        
        let corCategoria = "#888888";
        if (cat.includes("DEFESA") || cat.includes("CONFLITO")) corCategoria = "#ff2a2a";
        else if (cat.includes("ECONOMIA")) corCategoria = "#ffcc00";
        else if (cat.includes("POLÍTICA") || cat.includes("POLITICA")) corCategoria = "#00aaff";

        // GERA A IMAGEM DA BANDEIRA EM VEZ DO EMOJI
        let flagHTML = `<span style="margin-right: 8px;">🌍</span>`; // Ícone global padrão
        let textoBusca = (titulo + " " + desc).toLowerCase();
        
        for (let key in bandeiras) {
          let regex = new RegExp("\\b" + key + "\\b"); 
          if (regex.test(textoBusca)) {
            let isoCode = bandeiras[key];
            // Injeta a imagem diretamente da FlagCDN (16x12 pixels)
            flagHTML = `<img src="https://flagcdn.com/16x12/${isoCode}.png" style="margin-right: 8px; border: 1px solid #333;" alt="${isoCode}">`;
            break; 
          }
        }

        let item = `
          <a href="${urlNoticia}" target="_blank" style="display: inline-flex; align-items: center;">
            <div class="ticker-item">
              ${flagHTML}
              <span style="color: ${corCategoria}; font-weight: bold;">[${cat}]</span> 
              <span class="white-text" style="margin-left: 8px;">${titulo}</span> 
              <span class="separator">/ / /</span>
            </div>
          </a>
        `;
        tickerEl.innerHTML += item;
      });
    })
    .catch(error => {
      document.getElementById('news-ticker').innerHTML = "ERRO NAS COMUNICAÇÕES C4ISR...";
    });
</script>

</body>
</html>
