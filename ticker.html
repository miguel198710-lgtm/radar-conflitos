<!DOCTYPE html>
<html>
<head>
<style>
  body {
    margin: 0;
    background-color: #050505;
    color: #ffffff;
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
    border-top: 2px solid #333;
    border-bottom: 2px solid #333;
  }
  .ticker-wrap {
    width: 100%;
    overflow: hidden;
    white-space: nowrap;
    box-sizing: border-box;
  }
  .ticker {
    display: inline-block;
    padding-left: 100%;
    /* AJUSTE DE VELOCIDADE: Aumentado para 120 segundos para leitura fluida */
    animation: ticker 120s linear infinite; 
  }
  .ticker:hover {
    animation-play-state: paused;
  }
  .ticker-item {
    display: inline-block;
    padding: 10px 30px;
    font-size: 14px;
    text-transform: uppercase;
  }
  .white-text { color: #ffffff; }
  .time-text { color: #666666; font-size: 11px; margin-left: 10px;}
  .separator { color: #444; margin: 0 15px; }

  @keyframes ticker {
    0%   { transform: translate3d(0, 0, 0); }
    100% { transform: translate3d(-100%, 0, 0); }
  }
</style>
</head>
<body>

<div class="ticker-wrap">
  <div class="ticker" id="news-ticker">
    A CARREGAR INTELIGÊNCIA GLOBAL...
  </div>
</div>

<script>
  // COLA AQUI O TEU LINK RAW DO GITHUB QUE ACABA EM .geojson
  const geojsonURL = "https://raw.githubusercontent.com/miguel198710-lgtm/radar-conflitos/refs/heads/main/conflitos.geojson";

  fetch(geojsonURL)
    .then(response => response.json())
    .then(data => {
      const tickerEl = document.getElementById('news-ticker');
      tickerEl.innerHTML = ''; 
      
      data.features.forEach(feat => {
        let p = feat.properties;
        let titulo = p.titulo_evento || "EVENTO DESCONHECIDO";
        let cat = p.categoria ? p.categoria.toUpperCase() : "GERAL";
        let dataNoticia = p.data_noticia || "";
        
        // Novo Sistema de Cores Táticas (Só a etiqueta ganha cor)
        let corCategoria = "#888888"; // Cinzento padrão
        if (cat.includes("DEFESA") || cat.includes("CONFLITO")) {
          corCategoria = "#ff2a2a"; // Vermelho
        } else if (cat.includes("ECONOMIA")) {
          corCategoria = "#ffcc00"; // Amarelo
        } else if (cat.includes("POLÍTICA") || cat.includes("POLITICA")) {
          corCategoria = "#00aaff"; // Azul
        }

        let item = `
          <div class="ticker-item">
            <span style="color: ${corCategoria}; font-weight: bold;">■ [${cat}]</span> 
            <span class="white-text" style="margin-left: 8px;">${titulo}</span> 
            <span class="time-text">${dataNoticia}</span>
            <span class="separator">/ / /</span>
          </div>
        `;
        tickerEl.innerHTML += item;
      });
    })
    .catch(error => {
      document.getElementById('news-ticker').innerHTML = "ERRO NAS COMUNICAÇÕES C4ISR. A TENTAR RECONECTAR...";
    });
</script>

</body>
</html>
